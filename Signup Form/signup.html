<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="signup.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Sign up Form</h1>
    <h2>Enter your details</h2>
    <div>
        <div class="field">
            <label>Complete Name</label>
            <div>
                <input type="text" class="entrii">
            </div>
        </div>
        <div class="field">
            <label>Password</label>
            <div>
                <input type="password" class="entrii">
            </div>
        </div>
        <div class="field">
            <label>Date of birth</label>
            <div>
                <input type="date" class="entrii">
            </div>
        </div>
        <div class="field">
            <label>Gender</label>
            <div>
                <select class="entrii">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Trans</option>
                </select>
            </div>
        </div>
        <div class="field">
            <label>Email</label>
            <div>
                <input type="email" class="entrii">
            </div>
        </div>
        <div class="field">
            <button class="btn">Submit</button>
        </div>
    </div>
</body>

</html>
